{{- if .Values.nginx.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: comethru-nginx-metrics
  labels:
    {{- include "comethru.selectorLabels" . | nindent 4 }}
spec:
  type: {{ .Values.nginx.service.type }}
  selector:
    {{- include "comethru.selectorLabels" . | nindent 4 }}
    component: nginx
  ports:
    - port: 9113
      targetPort: 9113
{{- end }}