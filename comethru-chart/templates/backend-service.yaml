{{- if .Values.backend.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: comethru-backend
  labels:
    {{- include "comethru.selectorLabels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    {{- include "comethru.selectorLabels" . | nindent 4 }}
    component: backend
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.targetPort }}
{{- end }}